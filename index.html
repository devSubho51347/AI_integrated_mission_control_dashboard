<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KomputerMechanic OS - Agent Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050506;
      --panel: #111114;
      --panel-2: #151519;
      --line: #27272d;
      --muted: #8a8a93;
      --text: #f6f6f7;
      --orange: #ff7900;
      --blue: #4b93ff;
      --green: #19d19f;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --yellow: #f6b718;
      --red: #ff4d57;
      --cyan: #00c7e6;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 52% 0%, #17110c 0, rgba(5, 5, 6, 0) 360px), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
    }

    .app {
      width: min(1700px, calc(100vw - 48px));
      margin: 18px auto 64px;
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(14, 14, 16, .86);
      position: sticky;
      top: 12px;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .brand, .nav, .status, .title-row, .section-title, .agent-head, .metric-row, .chat-agent {
      display: flex;
      align-items: center;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff9a24, #ff4d00);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 12px;
      margin-right: 10px;
    }

    .brand strong { font-size: 18px; }
    .brand span { color: var(--orange); }
    .nav { gap: 12px; }
    .nav button {
      height: 36px;
      padding: 0 14px;
      border-radius: 8px;
      color: #b9b9c2;
      font-weight: 700;
      cursor: pointer;
    }
    .nav button.active {
      color: #fff;
      background: rgba(255, 121, 0, .18);
      outline: 1px solid rgba(255, 121, 0, .45);
    }

    .status { gap: 10px; color: #c9c9d1; font-size: 12px; }
    .icon-btn, .pill, .primary-btn, .ghost-btn {
      border: 1px solid var(--line);
      background: #131317;
      border-radius: 7px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn { width: 34px; }
    .pill { padding: 0 12px; gap: 8px; }
    .primary-btn {
      border: 0;
      padding: 0 18px;
      background: var(--orange);
      color: #fff;
      font-weight: 800;
    }
    .ghost-btn { padding: 0 14px; color: #bdbdc6; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 14px var(--orange); }

    main { padding-top: 90px; }
    .page { display: none; }
    .page.active { display: block; }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 34px;
      padding-bottom: 30px;
      border-bottom: 1px solid #17171b;
    }
    .title-row { gap: 16px; }
    .badge-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--orange);
      background: rgba(255, 121, 0, .13);
      border: 1px solid rgba(255, 121, 0, .25);
      font-weight: 900;
    }
    h1 { margin: 0 0 8px; font-size: 34px; letter-spacing: 0; }
    h2 { margin: 0; font-size: 22px; letter-spacing: 0; }
    h3 { margin: 0; font-size: 16px; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); line-height: 1.45; }

    .grid { display: grid; gap: 18px; }
    .cols-4 { grid-template-columns: repeat(4, 1fr); }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }
    .cols-2 { grid-template-columns: repeat(2, 1fr); }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(160deg, rgba(255,255,255,.035), rgba(255,255,255,.012));
      padding: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    .accent-orange { border-color: rgba(255, 121, 0, .6); }
    .accent-blue { border-color: rgba(75, 147, 255, .55); }
    .accent-green { border-color: rgba(25, 209, 159, .55); }
    .accent-purple { border-color: rgba(139, 92, 246, .55); }
    .accent-pink { border-color: rgba(236, 72, 153, .55); }
    .accent-yellow { border-color: rgba(246, 183, 24, .55); }
    .metric-label { color: var(--muted); font-size: 12px; text-transform: uppercase; font-weight: 900; letter-spacing: .04em; }
    .metric-value { display: block; margin-top: 10px; font-size: 34px; font-weight: 900; }
    .progress { height: 5px; background: #27272c; border-radius: 999px; overflow: hidden; }
    .bar { height: 100%; border-radius: inherit; background: var(--orange); width: var(--w); }

    .section-title { gap: 12px; margin: 30px 0 18px; }
    .mini-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: rgba(255, 121, 0, .12);
      color: var(--orange);
      border: 1px solid rgba(255, 121, 0, .22);
      font-weight: 900;
      font-size: 13px;
    }

    .agent-grid { grid-template-columns: repeat(6, 1fr); }
    .agent-card {
      min-height: 278px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }
    .agent-card:before {
      content: "";
      position: absolute;
      inset: -80px -40px auto auto;
      width: 170px;
      height: 170px;
      background: color-mix(in srgb, var(--agent), transparent 78%);
      filter: blur(30px);
    }
    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      margin: 0 auto;
      border: 1px solid color-mix(in srgb, var(--agent), transparent 25%);
      background: #19191f;
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--agent), transparent 88%);
      font-weight: 900;
    }
    .agent-card h3, .agent-card p { text-align: center; }
    .live { color: var(--green); background: rgba(25, 209, 159, .12); border-radius: 999px; padding: 5px 10px; font-size: 11px; font-weight: 900; }
    .ring {
      margin-left: auto;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 4px solid color-mix(in srgb, var(--agent), transparent 35%);
      font-size: 11px;
      font-weight: 900;
    }
    .task-count { font-size: 32px; font-weight: 900; }
    .meta { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 12px; font-weight: 800; }
    .model-chip, .tag {
      border-radius: 6px;
      padding: 5px 8px;
      background: #202024;
      color: #e8e8ef;
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      white-space: nowrap;
    }

    .chart-card { min-height: 230px; }
    svg { width: 100%; display: block; }
    .task-summary { min-height: 230px; }
    .summary-line { display: flex; justify-content: space-between; padding: 11px 0; color: #c8c8d0; }
    .alert { color: var(--red); background: rgba(255, 77, 87, .14); border: 1px solid rgba(255,77,87,.23); border-radius: 7px; padding: 12px; font-weight: 800; }

    .heatmap {
      display: grid;
      grid-template-columns: 96px repeat(24, 1fr);
      gap: 4px;
      align-items: center;
    }
    .cell {
      height: 44px;
      border-radius: 4px;
      background: #15151a;
      border: 1px solid #17171d;
    }
    .cell[data-level="1"] { opacity: .45; }
    .cell[data-level="2"] { opacity: .65; }
    .cell[data-level="3"] { opacity: .85; }
    .cell[data-level="4"] { opacity: 1; }
    .row-label { font-weight: 900; font-size: 12px; color: #d8d8df; }

    .tabs { display: flex; gap: 8px; margin: -8px 0 24px; }
    .tabs button { height: 38px; padding: 0 18px; border-radius: 8px; border: 1px solid var(--line); color: #aaaab3; font-weight: 800; cursor: pointer; }
    .tabs button.active { background: rgba(255,121,0,.18); color: #fff; border-color: rgba(255,121,0,.5); }
    .office {
      height: 640px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        radial-gradient(circle at 55% 50%, rgba(255,121,0,.08), transparent 360px),
        #08080a;
      background-size: 64px 64px, 64px 64px, auto, auto;
      position: relative;
      overflow: hidden;
    }
    .desk, .hub, .room {
      position: absolute;
      border: 1px solid #2c2c34;
      background: rgba(18,18,24,.82);
      border-radius: 8px;
      text-align: center;
      padding: 12px;
    }
    .desk { width: 170px; height: 70px; }
    .hub { left: 30%; top: 40%; width: 40%; height: 190px; border-color: rgba(255,121,0,.6); color: var(--orange); }
    .room { right: 5%; top: 14%; width: 25%; height: 470px; border-style: dashed; border-color: rgba(255,121,0,.5); }
    .agent-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 34px auto 6px;
      background: var(--agent);
      color: #fff;
      font-weight: 900;
    }

    .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
    .search { flex: 1; height: 42px; padding: 0 14px; border: 1px solid var(--line); border-radius: 7px; background: #111115; }
    .kanban { grid-template-columns: repeat(3, 1fr); }
    .column { min-height: 620px; border-color: #2a2a31; }
    .column-head { display: flex; justify-content: space-between; margin-bottom: 18px; text-transform: uppercase; font-size: 12px; font-weight: 900; color: #aaaab3; }
    .task {
      border: 1px solid #2b2b33;
      border-left: 4px solid var(--blue);
      border-radius: 8px;
      padding: 14px;
      background: #121217;
      margin-bottom: 12px;
    }
    .task.done { opacity: .66; text-decoration: line-through; border-left-color: var(--green); background: rgba(25,209,159,.06); }
    .task.urgent { border-left-color: var(--red); box-shadow: inset 0 0 0 1px rgba(255,77,87,.16); }
    .task strong { display: block; margin-bottom: 12px; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { font-family: inherit; color: #fff; }

    .content-layout { grid-template-columns: 320px 1fr; align-items: start; }
    .doc-list { height: 760px; overflow: hidden; padding: 10px; border-right: 3px solid var(--orange); }
    .doc { display: grid; grid-template-columns: 34px 1fr; gap: 12px; padding: 16px; border-radius: 8px; margin-bottom: 12px; background: #151519; }
    .doc.active { outline: 1px solid rgba(255,121,0,.6); }
    .preview { min-height: 760px; border-right: 4px solid var(--orange); }
    .article { max-width: 1060px; padding: 30px; }
    .article h2 { font-size: 26px; margin: 16px 0; }
    .article p, .article li { color: #c9c9d0; line-height: 1.65; }

    .chat-layout { grid-template-columns: 260px 1fr; min-height: 820px; }
    .chat-list { border-right: 1px solid var(--line); padding-right: 22px; }
    .chat-agent { gap: 12px; padding: 14px; border-radius: 8px; margin-bottom: 10px; }
    .chat-agent.active { background: rgba(255,121,0,.09); border-left: 3px solid var(--orange); }
    .thread { display: flex; flex-direction: column; min-height: 820px; }
    .messages { flex: 1; border-top: 1px solid #17171b; border-bottom: 1px solid #17171b; padding: 26px 0; }
    .message { max-width: 560px; padding: 15px 18px; background: #17171c; border: 1px solid #282830; border-radius: 8px; margin: 0 0 20px 34px; line-height: 1.45; color: #e8e8ef; }
    .composer { display: flex; gap: 12px; padding-top: 18px; }

    .resource { padding: 28px; }
    .resource .metric-value { font-size: 44px; }
    .model-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px;
      border-radius: 8px;
      background: #131318;
      margin-bottom: 12px;
    }

    .planner-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin: 28px 0 10px;
    }
    .week-switcher {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101014;
      padding: 6px;
      font-weight: 900;
    }
    .week-switcher .icon-btn { height: 30px; width: 30px; }
    .week-range { min-width: 190px; text-align: center; }
    .week-table-wrap { overflow-x: auto; padding: 0; }
    .week-table {
      width: 100%;
      min-width: 1040px;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .week-table th,
    .week-table td {
      border-bottom: 1px solid #202027;
      border-right: 1px solid #202027;
      padding: 12px 10px;
      text-align: center;
      color: #e7e7ee;
      font-size: 13px;
    }
    .week-table th {
      color: #f4f4f7;
      background: rgba(255,255,255,.025);
      font-size: 12px;
      vertical-align: bottom;
    }
    .week-table th:first-child,
    .week-table td:first-child,
    .week-table th:nth-child(2),
    .week-table td:nth-child(2) {
      width: 86px;
      font-weight: 900;
    }
    .week-table th:last-child,
    .week-table td:last-child { border-right: 0; }
    .task-icon {
      display: block;
      color: var(--orange);
      font-size: 18px;
      margin-bottom: 6px;
    }
    .task-check {
      accent-color: var(--purple);
      width: 14px;
      height: 14px;
    }
    .daily-progress {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      align-items: center;
    }
    .note-link {
      color: var(--purple);
      font-weight: 900;
      white-space: nowrap;
    }

    .data-note {
      margin-top: 30px;
      color: #bdbdc6;
      border: 1px dashed #3a3a43;
      background: rgba(255,255,255,.025);
    }

    @media (max-width: 1100px) {
      .app { width: min(100vw - 24px, 980px); }
      .topbar { height: auto; min-height: 58px; flex-wrap: wrap; gap: 12px; padding: 12px; }
      .nav { order: 3; width: 100%; overflow-x: auto; padding-bottom: 2px; }
      main { padding-top: 42px; }
      .cols-4, .cols-3, .cols-2, .agent-grid, .kanban, .content-layout, .chat-layout { grid-template-columns: 1fr; }
      .agent-grid { grid-template-columns: repeat(2, 1fr); }
      .planner-tools { align-items: flex-start; flex-direction: column; }
      .page-header { flex-direction: column; }
      .heatmap { grid-template-columns: 72px repeat(12, 1fr); }
      .heatmap .cell:nth-child(n+14) { display: none; }
    }

    @media (max-width: 620px) {
      .agent-grid { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
      .status { display: none; }
      .office { height: 520px; }
      .desk, .hub, .room { transform: scale(.74); transform-origin: top left; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><div class="logo">KM</div><strong>Komputer<span>Mechanic OS</span></strong></div>
      <nav class="nav" id="nav"></nav>
      <div class="status">
        <button class="icon-btn" title="Messages">[]</button>
        <button class="icon-btn" title="Refresh">R</button>
        <button class="icon-btn" title="Alerts">!</button>
        <span class="pill">v0.1.5</span>
        <span class="dot"></span>
        <span>System Online</span>
      </div>
    </header>

    <main>
      <section id="dashboard" class="page active"></section>
      <section id="content" class="page"></section>
      <section id="agents" class="page"></section>
      <section id="tasks" class="page"></section>
      <section id="chat" class="page"></section>
      <section id="productivity" class="page"></section>
      <section id="monitor" class="page"></section>
    </main>
  </div>

  <script>
    /*
      Static template: top navigation, dark KM OS visual system, responsive grids,
      cards, charts, Kanban columns, office map, document preview, and chat shell.

      Mock placeholders to replace with live data later:
      - MOCK_DATA.agents: real OpenClaw agent registry, model assignment, status, last activity.
      - MOCK_DATA.metrics: dashboard counters, uptime, task totals.
      - MOCK_DATA.tasks: live task/Kanban API or task database.
      - MOCK_DATA.activity: recent agent event stream and historical chart points.
      - MOCK_DATA.documents: generated files/content index and rendered previews.
      - MOCK_DATA.messages: per-agent chat/session history.
      - MOCK_DATA.monitor: gateway, Discord, database, VPS, token/cost, cron status.
      - MOCK_DATA.productivity: planner goals, default tasks, daily checklist, notes.
    */

        ]
      },

      messages: [

        ["Bill", "Hello Larry - Bill here. Chat feature looks live on my side.", "08:50"],
        ["Bill", "Doing well - steady and ready on ops. Glad to hear from you. How's your day going?", "08:55"],
        ["Bill", "Nothing specific on my end this evening - Discord operations are quiet. Anything you need me to check on?", "22:18"],
        ["Bill", "Sure - Discord side things are running steady: server activity normal, channels nominal, team routed cleanly.", "23:02"]
      ],
      monitor: {
        status: [["Gateway", "Online", "Port 50822 - server 3d 0h 2m", "green"], ["Discord", "Connected", "Bindings - 6 agents", "blue"], ["Database", "240 KB", "Agent logs - 2.0 MB", "yellow"], ["Uptime", "12d 0h", "Since boot - server 3d 0h 2m", "orange"]],
        resources: [["CPU", "8.3%", "Average across all cores", "purple", 8], ["RAM", "31.6%", "2.5 GB used of 8.0 GB", "blue", 32], ["Storage", "29.0%", "29.0 GB used of 100 GB", "yellow", 29]],
        usage: [["Scout", "284", "~961.2K tokens", "$4.81"], ["Orchestrator", "261", "~882.2K tokens", "$4.41"], ["Scribe", "238", "~804.4K tokens", "$4.02"]]
      },
      productivity: {
        monthly: ["Read 4 books", "Work out 20 days", "Save $500", "Learn a new skill", "Meditate daily"],
        weekly: ["Exercise 4 times", "Eat healthy meals", "No sugar this week", "Daily 30 min reading", "Sleep by 11 PM"],
        defaults: ["Drink 8 glasses of water", "Morning workout / Walk", "Meditate for 10 minutes", "Read 20 pages", "Plan your day", "No screen time after 10 PM"],
        weekRange: "May 12 - May 18, 2024",
        weekDays: [
          { date: "May 12", day: "Sun", done: [true, true, true, true, true, true], notes: true },
          { date: "May 13", day: "Mon", done: [true, true, false, true, false, false], notes: true },
          { date: "May 14", day: "Tue", done: [true, true, true, true, true, false], notes: true },
          { date: "May 15", day: "Wed", done: [true, true, true, true, true, true], notes: true },
          { date: "May 16", day: "Thu", done: [true, false, true, false, true, false], notes: true },
          { date: "May 17", day: "Fri", done: [true, true, true, false, true, false], notes: true },
          { date: "May 18", day: "Sat", done: [true, true, true, true, false, false], notes: true }
        ]
      }
    };

    const pageIds = MOCK_DATA.pages.map(p => p.toLowerCase());
    const nav = document.getElementById("nav");
    nav.innerHTML = MOCK_DATA.pages.map((p, i) => `<button class="${i === 0 ? "active" : ""}" data-page="${p.toLowerCase()}">${p}</button>`).join("");
    nav.addEventListener("click", (event) => {
      const button = event.target.closest("button");
      if (!button) return;
      document.querySelectorAll(".nav button").forEach(b => b.classList.toggle("active", b === button));
      document.querySelectorAll(".page").forEach(p => p.classList.toggle("active", p.id === button.dataset.page));
    });

    const title = (icon, name, text, actions = "") => `
      <div class="page-header">
        <div class="title-row"><div class="badge-icon">${icon}</div><div><h1>${name}</h1><p>${text}</p></div></div>
        <div class="status">${actions}</div>
      </div>`;
    const section = (icon, name, text = "") => `<div class="section-title"><div class="mini-icon">${icon}</div><div><h2>${name}</h2>${text ? `<p>${text}</p>` : ""}</div></div>`;
    const metricCard = ([label, value, sub, accent]) => `<div class="card accent-${accent}"><span class="metric-label">${label}</span><span class="metric-value">${value}</span><p>${sub}</p></div>`;

    function lineChart(pointsA, pointsB) {
      const coords = points => points.map((v, i) => `${40 + i * 150},${180 - v * 2}`).join(" ");
      return `<svg viewBox="0 0 980 220" aria-label="Mock activity chart">
        <g stroke="#24242b" stroke-width="1">${[40,80,120,160,200].map(y => `<line x1="36" x2="950" y1="${y}" y2="${y}" />`).join("")}</g>
        <polyline fill="none" stroke="var(--orange)" stroke-width="4" points="${coords(pointsA)}" />
        <polyline fill="none" stroke="var(--green)" stroke-width="4" points="${coords(pointsB)}" />
        ${pointsA.map((v, i) => `<circle cx="${40 + i * 150}" cy="${180 - v * 2}" r="5" fill="var(--orange)" />`).join("")}
        <text x="40" y="212" fill="#888">Mon</text><text x="190" y="212" fill="#888">Tue</text><text x="340" y="212" fill="#888">Wed</text><text x="490" y="212" fill="#888">Thu</text><text x="640" y="212" fill="#888">Fri</text><text x="790" y="212" fill="#888">Sat</text><text x="920" y="212" fill="#888">Sun</text>
      </svg>`;
    }

    function agentsGrid() {
      return `<div class="grid agent-grid">${MOCK_DATA.agents.map(a => `
        <article class="card agent-card" style="--agent:${a.color}">
          <div class="avatar">${a.icon}</div>
          <div><h3>${a.name}</h3><p>${a.role}</p></div>
          <div class="metric-row"><span class="live">${a.status || "LIVE"}</span><span class="ring">${a.success}%</span></div>
          <div><span class="task-count">${a.tasks}</span><span class="metric-label" style="float:right;margin-top:17px">Tasks Today</span></div>
          <div class="progress"><div class="bar" style="--w:${a.success}%;background:${a.color}"></div></div>
          <div class="meta"><span>MODEL</span><span class="model-chip">${a.model}</span></div>
          <div class="meta"><span>ACTIVE</span><span>${a.active}</span></div>
        </article>`).join("")}</div>`;
    }

    function taskDistributionChart() {
      const stats = MOCK_DATA.agentStats || {};
      const distribution = stats.distribution || [];
      const total = distribution.reduce((sum, item) => sum + item.value, 0);
      const circumference = 220;
      let offset = 0;
      const segments = distribution.map(item => {
        const length = total ? (item.value / total) * circumference : 0;
        const segment = `<circle cx="60" cy="60" r="35" fill="none" stroke="${item.color}" stroke-width="18" stroke-dasharray="${length} ${circumference}" stroke-dashoffset="${-offset}" transform="rotate(-90 60 60)"/>`;
        offset += length;
        return segment;
      }).join("");
      return `<svg viewBox="0 0 120 120" aria-label="Agent task distribution">
        <circle cx="60" cy="60" r="35" fill="none" stroke="#333" stroke-width="18"/>
        ${segments}
      </svg>`;
    }

    function agentTaskStats() {
      const stats = MOCK_DATA.agentStats || {};
      const total = stats.total || 0;
      const todayRate = total ? Math.round(((stats.today || 0) / total) * 100) : 0;
      const weekRate = stats.weekRate || 0;
      return section("||", "Task Statistics") + `<div class="grid cols-3"><div class="card"><span class="metric-label">Tasks Today</span><span class="metric-value">${stats.today || 0}</span><div class="progress"><div class="bar" style="--w:${todayRate}%"></div></div></div><div class="card"><span class="metric-label">Tasks This Week</span><span class="metric-value">${stats.week || 0}</span><div class="progress"><div class="bar" style="--w:${weekRate}%;background:var(--blue)"></div></div></div><div class="card"><h3>Task Distribution</h3>${taskDistributionChart()}</div></div>`;
    }

    function agentRecentActivity() {
      const events = MOCK_DATA.activity.events || [];
      const models = (MOCK_DATA.agentStats?.models || []).length ? MOCK_DATA.agentStats.models : [{ model: "No logged model usage", tasks: 0, share: 0 }];
      return section("R", "Recent Activity", "Live feed from all agents") + `<div class="grid cols-2"><div class="card">${events.length ? events.map(e => `<p><strong>${e[0]}</strong> ${e[1]} <span class="live">${e[2]}</span> <span style="float:right;color:#777">${e[3]}</span></p><hr style="border-color:#202026">`).join("") : `<p>No recent log activity</p>`}</div><div class="card">${models.map(m => `<div class="model-row"><div><strong>${m.model}</strong><p>${m.tasks} logged task${m.tasks === 1 ? "" : "s"}</p></div><strong>${m.share}% usage</strong></div>`).join("")}</div></div>`;
    }

    function agentModelUsage() {
      return section("M", "Model Usage", "Per-agent latest model from the log database or configured fallback") + `<div class="card">${MOCK_DATA.agents.map(a => `<div class="model-row"><strong>${a.icon} ${a.name}</strong><span><span class="model-chip">${a.model}</span> <span class="model-chip">${a.tasks} log${a.tasks === 1 ? "" : "s"}</span></span></div>`).join("")}</div>`;
    }

    function agentsOverview() {
      return agentsGrid() + agentTaskStats() + agentRecentActivity() + agentModelUsage();
    }

    function dashboard() {
      document.getElementById("dashboard").innerHTML = title("Z", "Command Center", "Agents, tasks, and YouTube at a glance.") +
        `<div class="grid cols-4">${MOCK_DATA.metrics.map(metricCard).join("")}</div>` +
        `<div class="grid cols-2">
          <div>${section("^", "Agent Activity", "Last 7 days")}<div class="card chart-card">${lineChart(MOCK_DATA.activity.total, MOCK_DATA.activity.completed)}</div></div>
          <div>${section("T", "Task Summary", "Kanban overview")}<div class="card task-summary">
            <div class="summary-line"><span>To Do</span><strong>4</strong></div><div class="summary-line"><span>In Progress</span><strong style="color:var(--blue)">3</strong></div><div class="summary-line"><span>Done</span><strong style="color:var(--green)">8</strong></div><div class="summary-line"><span>Urgent</span><strong style="color:var(--red)">7</strong></div><div class="alert">4 overdue tasks</div><button class="ghost-btn" style="width:100%;margin-top:12px">Open Kanban Board</button>
          </div></div>
        </div>` +
        section("##", "Activity Heatmap", "Who's busy when - last 7 days - local time") + `<div class="card">${heatmap()}</div>`;
    }

    function heatmap() {
      return `<div class="heatmap">${MOCK_DATA.agents.map((a, r) => `<div class="row-label" style="color:${a.color}">${a.name}</div>${Array.from({length:24}, (_, i) => `<div class="cell" data-level="${((i + r) % 5)}" style="background:${a.color}"></div>`).join("")}`).join("")}</div>`;
    }

    function agents() {
      document.getElementById("agents").innerHTML = title("Z", "Agents", "Live agent operations, task metrics, and real-time activity across your autonomous fleet.", `<span>Updated 27s ago</span><button class="ghost-btn">Refresh</button>`) +
        `<div class="tabs"><button class="active" data-agent-view="overview">Overview</button><button data-agent-view="office">The Office</button></div><div id="agent-view">` + agentsOverview() + `</div>`;
      document.querySelectorAll("[data-agent-view]").forEach(button => button.addEventListener("click", () => {
        document.querySelectorAll("[data-agent-view]").forEach(b => b.classList.toggle("active", b === button));
        document.getElementById("agent-view").innerHTML = button.dataset.agentView === "office" ? officeView() : agentsOverview();
      }));
    }

    function officeView() {
      return section("HQ", "The Office", "Live view of your agent HQ - desks light up on activity") +
        `<div class="office">
          <div class="desk" style="left:22%;top:12%">Scout<div class="agent-dot" style="--agent:var(--pink)">S</div><p>7d ago</p></div>
          <div class="desk" style="left:42%;top:12%">Scribe<div class="agent-dot" style="--agent:var(--yellow)">Sc</div><p>7d ago</p></div>
          <div class="desk" style="left:8%;top:44%">Reach<div class="agent-dot" style="--agent:var(--green)">R</div><p>7d ago</p></div>
          <div class="desk" style="left:60%;top:44%">Orch<div class="agent-dot" style="--agent:var(--blue)">O</div><p>12d ago</p></div>
          <div class="desk" style="left:42%;top:74%">Dev<div class="agent-dot" style="--agent:var(--red)">D</div><p>7d ago</p></div>
          <div class="hub"><strong>WORKING HUB</strong><p style="margin-top:40px;color:#fff">Picked top evening news item</p></div>
          <div class="room"><strong>BILL</strong><div class="agent-dot" style="--agent:var(--purple);margin-top:210px">B</div><h3>Bill</h3><p>5h ago</p></div>
        </div>`;
    }

    function tasks() {
      const col = (name, items, cls = "") => `<div class="card column ${cls}"><div class="column-head"><span>${name}</span><span>${items.length}</span></div>${items.map(t => `<div class="task ${name === "Done" ? "done" : ""} ${t[1] === "Urgent" || t[2] === "Urgent" ? "urgent" : ""}"><strong>${t[0]}</strong><div class="tags"><span class="tag">${t[1]}</span><span class="tag">${t[2]}</span>${t[3] ? `<span class="tag" style="color:var(--red)">${t[3]}</span>` : ""}</div></div>`).join("")}<button class="ghost-btn" style="width:100%;margin-top:12px">+ Add task</button></div>`;
      document.getElementById("tasks").innerHTML = title("T", "Tasks", "Kanban board synced with the live dashboard task API.", `<button class="primary-btn">+ New Task</button>`) +
        `<div class="toolbar"><input class="search" placeholder="Search tasks..." /><button class="ghost-btn">All Categories</button><button class="ghost-btn">All Priorities</button></div>
        <p style="margin-bottom:20px">4 todo - 3 in progress - 8 done - <strong style="color:var(--red)">7 urgent</strong> - <strong style="color:var(--red)">6 overdue</strong></p>
        <div class="grid kanban">${col("To Do", MOCK_DATA.tasks.todo)}${col("In Progress", MOCK_DATA.tasks.progress)}${col("Done", MOCK_DATA.tasks.done, "accent-green")}</div>`;
    }

    function content() {
      document.getElementById("content").innerHTML = title("D", "Content", "Documents generated by your agents.", `<button class="ghost-btn">All Agents</button><button class="primary-btn">+ New Document</button>`) +
        `<div class="grid cols-3">${metricCard(["Total Docs", "12", "", "pink"])}${metricCard(["Agents Writing", "4", "", "purple"])}${metricCard(["Latest", "Mission Control: Building a Live AI Agent Dashboard", "", "orange"])}</div>
        <div class="grid content-layout">${section("F", "Documents", "Click to preview")}<div></div><aside class="card doc-list">${MOCK_DATA.documents.map((d,i) => `<div class="doc ${i===0?"active":""}"><div class="mini-icon">P</div><div><strong>${d[0]}</strong><p>${d[1]}</p><p>${d[2]}</p></div></div>`).join("")}</aside><article class="card preview"><div class="article"><p class="metric-label">SCRIBE / 2026-05-06_MISSION-CONTROL-DASHBOARD.MD</p><h2>Mission Control: Building a Live AI Agent Dashboard</h2><p><em>By Scribe - May 6, 2026</em></p><p>We're building something I haven't seen anyone else ship yet: a real-time operations dashboard for a fleet of autonomous AI agents.</p><h3>What It Does</h3><ul><li>Agent cards show each agent's status, task count, completion rate, and last activity.</li><li>The Office is an animated workspace where agents move to their desks and working hub.</li><li>Tasks Kanban is synced to the live API for create, update, and movement.</li><li>Content tab lists generated documents and rendered previews.</li><li>Chat tab sends direct messages to any agent channel.</li></ul><h3>What's Coming</h3><p>Agent-to-agent delegation UI, alert system for failed tasks, YouTube analytics, and cost monitoring.</p></div></article></div>`;
    }

    function chat() {
      document.getElementById("chat").innerHTML = `<div class="grid chat-layout"><aside class="chat-list">${section("M", "Messages", "Chat with your agents")}${MOCK_DATA.agents.slice(1).map((a,i) => `<div class="chat-agent ${i===0?"active":""}"><div class="avatar" style="--agent:${a.color};width:38px;height:38px">${a.icon}</div><div><strong>${a.name}</strong><p>${a.role}</p></div></div>`).join("")}</aside><section class="thread"><div class="agent-head" style="gap:12px;margin-bottom:20px"><div class="avatar" style="--agent:var(--purple);width:42px;height:42px">B</div><div><h2>Bill <span class="live">LIVE</span></h2><p>Discord Operations</p></div></div><div class="messages">${MOCK_DATA.messages.map(m => `<div class="message">${m[1]}<p style="font-size:11px;margin-top:8px">${m[2]}</p></div>`).join("")}</div><div class="composer"><input class="search" placeholder="Type a message..." /><button class="primary-btn">Send</button></div></section></div>`;
    }

    function productivity() {
      const checks = (items, completed = 2) => items.map((x,i) => `<p style="margin:10px 0"><input type="checkbox" ${i<completed?"checked":""}/> ${x}</p>`).join("");
      const productivityData = MOCK_DATA.productivity || {};
      const defaultTasks = productivityData.defaults || [];
      const weekDays = productivityData.weekDays || [];
      const taskIcons = ["D", "R", "M", "B", "P", "N"];
      const completedCount = values => values.filter(Boolean).length;
      const progressCell = values => {
        const percent = defaultTasks.length ? Math.round((completedCount(values) / defaultTasks.length) * 100) : 0;
        return `<div class="daily-progress"><strong>${percent}%</strong><div class="progress"><div class="bar" style="--w:${percent}%;background:var(--purple)"></div></div></div>`;
      };
      const weekRows = weekDays.map(day => `<tr>
        <td>${day.date}</td>
        <td>${day.day}</td>
        ${defaultTasks.map((_, i) => `<td><input class="task-check" type="checkbox" ${day.done?.[i] ? "checked" : ""} /></td>`).join("")}
        <td>${progressCell(day.done || [])}</td>
        <td><span class="note-link">${day.notes ? "Edit Note" : "Add Note"}</span></td>
      </tr>`).join("");
      document.getElementById("productivity").innerHTML = title("P", "Weekly Planner", "Goals, habits, notes, and daily progress.") +
        `<div class="grid cols-3"><div class="card accent-purple"><div class="meta"><h3>Monthly Goals</h3><span>2 / 5 completed</span></div><div class="progress"><div class="bar" style="--w:40%;background:var(--purple)"></div></div>${checks(productivityData.monthly || [], 2)}</div><div class="card accent-green"><div class="meta"><h3>Weekly Goals</h3><span>3 / 5 completed</span></div><div class="progress"><div class="bar" style="--w:60%;background:var(--green)"></div></div>${checks(productivityData.weekly || [], 3)}</div><div class="card accent-orange"><div class="meta"><h3>Default Daily Tasks</h3><span>4 / 6 today</span></div>${checks(defaultTasks, 4)}<button class="ghost-btn" style="margin-top:10px;color:var(--orange)">+ Add New Default Task</button></div></div>
        ${section("C", "Daily Default Task Progress - This Month")}<div class="card chart-card">${lineChart([60,65,78,68,74,62,70], [58,64,76,66,72,61,69])}</div>
        <div class="planner-tools">
          ${section("W", "Default Entire Week", "Track every default daily task across the selected week.")}
          <div class="week-switcher"><button class="icon-btn" title="Previous week">&lt;</button><span class="week-range">${productivityData.weekRange || "Current Week"}</span><button class="icon-btn" title="Next week">&gt;</button></div>
          <button class="ghost-btn" style="color:var(--orange)">Today</button>
        </div>
        <div class="card week-table-wrap"><table class="week-table">
          <thead><tr><th>Date</th><th>Day</th>${defaultTasks.map((task, i) => `<th><span class="task-icon">${taskIcons[i] || "T"}</span>${task}</th>`).join("")}<th>Daily Progress</th><th>Notes</th></tr></thead>
          <tbody>${weekRows}</tbody>
        </table></div>
        ${section("N", "Notes")}<div class="grid cols-2"><div class="card"><h3>Notes - May 13 (Mon)</h3><input class="search" placeholder="Add a title" style="margin:14px 0"/><p><input type="checkbox"> Buy groceries</p><p><input type="checkbox"> Call mom</p><p><input type="checkbox" checked> Work on project report</p><p><input type="checkbox"> Practice guitar</p></div><div class="card"><h3>Quick Actions</h3><p>Clear Completed</p><p>Export Notes</p><p>Print Notes</p><p style="color:var(--red)">Delete Notes</p></div></div>`;
    }

    function monitor() {
      document.getElementById("monitor").innerHTML = title("M", "Monitor", "System health, token usage, and model config.") +
        `<div class="grid cols-4">${MOCK_DATA.monitor.status.map(metricCard).join("")}</div>${section("V", "VPS Resources", "Live CPU - RAM - Storage")}<div class="grid cols-3">${MOCK_DATA.monitor.resources.map(r => `<div class="card resource"><span class="metric-label">${r[0]}</span><span class="metric-value">${r[1]}</span><p>${r[2]}</p><div class="progress"><div class="bar" style="--w:${r[4]}%;background:var(--${r[3]})"></div></div></div>`).join("")}</div>
        ${section("$", "Token Usage & Cost", "API consumption tracking")}<div class="grid cols-3">${metricCard(["Total Requests", "1247", "", "orange"])}${metricCard(["Estimated Tokens", "4.2M", "", "purple"])}${metricCard(["Est. Cost", "$21.09", "", "green"])}</div><div class="grid cols-2"><div class="card">${MOCK_DATA.monitor.usage.map(u => `<div class="model-row"><div><strong>${u[0]}</strong><p>${u[2]}</p></div><div><strong>${u[1]}</strong><p style="color:var(--green)">${u[3]}</p></div></div>`).join("")}</div><div class="card chart-card"><h3>Usage Trend</h3>${lineChart([150,178,138,205,220,112,240], [140,170,128,190,210,105,230])}</div></div>`;
    }

    async function loadDashboardData() {
      if (location.protocol === "file:") return;
      try {
        const response = await fetch("/api/bootstrap", { cache: "no-store" });
        if (!response.ok) return;
        MOCK_DATA = await response.json();
      } catch (error) {
        console.warn("Using embedded dashboard preview data", error);
      }
    }

    async function initializeDashboard() {
      await loadDashboardData();
      dashboard();
      agents();
      tasks();
      content();
      chat();
      productivity();
      monitor();
    }

    initializeDashboard();
  </script>
</body>
</html>
