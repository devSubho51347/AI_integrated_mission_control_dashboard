<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>KomputerMechanic OS - Agent Dashboard</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #050506;
      --panel: #111114;
      --panel-2: #151519;
      --line: #27272d;
      --muted: #8a8a93;
      --text: #f6f6f7;
      --orange: #ff7900;
      --blue: #4b93ff;
      --green: #19d19f;
      --purple: #8b5cf6;
      --pink: #ec4899;
      --yellow: #f6b718;
      --red: #ff4d57;
      --cyan: #00c7e6;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: radial-gradient(circle at 52% 0%, #17110c 0, rgba(5, 5, 6, 0) 360px), var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    button, input, select {
      font: inherit;
      color: inherit;
      background: none;
      border: 0;
    }

    .app {
      width: min(1700px, calc(100vw - 48px));
      margin: 18px auto 64px;
    }

    .topbar {
      height: 58px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 22px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: rgba(14, 14, 16, .86);
      position: sticky;
      top: 12px;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    .brand, .nav, .status, .title-row, .section-title, .agent-head, .metric-row, .chat-agent {
      display: flex;
      align-items: center;
    }

    .logo {
      width: 32px;
      height: 32px;
      border-radius: 50%;
      background: linear-gradient(135deg, #ff9a24, #ff4d00);
      display: grid;
      place-items: center;
      font-weight: 900;
      font-size: 12px;
      margin-right: 10px;
    }

    .brand strong { font-size: 18px; }
    .brand span { color: var(--orange); }
    .nav { gap: 12px; }
    .nav button {
      height: 36px;
      padding: 0 14px;
      border-radius: 8px;
      color: #b9b9c2;
      font-weight: 700;
      cursor: pointer;
    }
    .nav button.active {
      color: #fff;
      background: rgba(255, 121, 0, .18);
      outline: 1px solid rgba(255, 121, 0, .45);
    }

    .status { gap: 10px; color: #c9c9d1; font-size: 12px; }
    .icon-btn, .pill, .primary-btn, .ghost-btn {
      border: 1px solid var(--line);
      background: #131317;
      border-radius: 7px;
      height: 34px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
    }
    .icon-btn { width: 34px; }
    .pill { padding: 0 12px; gap: 8px; }
    .primary-btn {
      border: 0;
      padding: 0 18px;
      background: var(--orange);
      color: #fff;
      font-weight: 800;
    }
    .ghost-btn { padding: 0 14px; color: #bdbdc6; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: var(--orange); box-shadow: 0 0 14px var(--orange); }

    main { padding-top: 90px; }
    .page { display: none; }
    .page.active { display: block; }

    .page-header {
      display: flex;
      justify-content: space-between;
      gap: 24px;
      margin-bottom: 34px;
      padding-bottom: 30px;
      border-bottom: 1px solid #17171b;
    }
    .title-row { gap: 16px; }
    .badge-icon {
      width: 54px;
      height: 54px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      color: var(--orange);
      background: rgba(255, 121, 0, .13);
      border: 1px solid rgba(255, 121, 0, .25);
      font-weight: 900;
    }
    h1 { margin: 0 0 8px; font-size: 34px; letter-spacing: 0; }
    h2 { margin: 0; font-size: 22px; letter-spacing: 0; }
    h3 { margin: 0; font-size: 16px; letter-spacing: 0; }
    p { margin: 0; color: var(--muted); line-height: 1.45; }

    .grid { display: grid; gap: 18px; }
    .cols-4 { grid-template-columns: repeat(4, 1fr); }
    .cols-3 { grid-template-columns: repeat(3, 1fr); }
    .cols-2 { grid-template-columns: repeat(2, 1fr); }
    .card {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: linear-gradient(160deg, rgba(255,255,255,.035), rgba(255,255,255,.012));
      padding: 22px;
      box-shadow: inset 0 1px 0 rgba(255,255,255,.03);
    }
    .accent-orange { border-color: rgba(255, 121, 0, .6); }
    .accent-blue { border-color: rgba(75, 147, 255, .55); }
    .accent-green { border-color: rgba(25, 209, 159, .55); }
    .accent-purple { border-color: rgba(139, 92, 246, .55); }
    .accent-pink { border-color: rgba(236, 72, 153, .55); }
    .accent-yellow { border-color: rgba(246, 183, 24, .55); }
    .metric-label { color: var(--muted); font-size: 12px; text-transform: uppercase; font-weight: 900; letter-spacing: .04em; }
    .metric-value { display: block; margin-top: 10px; font-size: 34px; font-weight: 900; }
    .progress { height: 5px; background: #27272c; border-radius: 999px; overflow: hidden; }
    .bar { height: 100%; border-radius: inherit; background: var(--orange); width: var(--w); }

    .section-title { gap: 12px; margin: 30px 0 18px; }
    .mini-icon {
      width: 34px;
      height: 34px;
      border-radius: 9px;
      display: grid;
      place-items: center;
      background: rgba(255, 121, 0, .12);
      color: var(--orange);
      border: 1px solid rgba(255, 121, 0, .22);
      font-weight: 900;
      font-size: 13px;
    }

    .agent-grid { grid-template-columns: repeat(6, 1fr); }
    .agent-card {
      min-height: 278px;
      display: flex;
      flex-direction: column;
      gap: 18px;
      position: relative;
      overflow: hidden;
    }
    .agent-card:before {
      content: "";
      position: absolute;
      inset: -80px -40px auto auto;
      width: 170px;
      height: 170px;
      background: color-mix(in srgb, var(--agent), transparent 78%);
      filter: blur(30px);
    }
    .avatar {
      width: 58px;
      height: 58px;
      border-radius: 14px;
      display: grid;
      place-items: center;
      margin: 0 auto;
      border: 1px solid color-mix(in srgb, var(--agent), transparent 25%);
      background: #19191f;
      box-shadow: 0 0 0 6px color-mix(in srgb, var(--agent), transparent 88%);
      font-weight: 900;
    }
    .agent-card h3, .agent-card p { text-align: center; }
    .live { color: var(--green); background: rgba(25, 209, 159, .12); border-radius: 999px; padding: 5px 10px; font-size: 11px; font-weight: 900; }
    .ring {
      margin-left: auto;
      width: 44px;
      height: 44px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      border: 4px solid color-mix(in srgb, var(--agent), transparent 35%);
      font-size: 11px;
      font-weight: 900;
    }
    .task-count { font-size: 32px; font-weight: 900; }
    .meta { display: flex; justify-content: space-between; align-items: center; color: var(--muted); font-size: 12px; font-weight: 800; }
    .model-chip, .tag {
      border-radius: 6px;
      padding: 5px 8px;
      background: #202024;
      color: #e8e8ef;
      font-size: 11px;
      font-family: ui-monospace, SFMono-Regular, Consolas, monospace;
      white-space: nowrap;
    }

    .chart-card { min-height: 230px; }
    svg { width: 100%; display: block; }
    .task-summary { min-height: 230px; }
    .summary-line { display: flex; justify-content: space-between; padding: 11px 0; color: #c8c8d0; }
    .alert { color: var(--red); background: rgba(255, 77, 87, .14); border: 1px solid rgba(255,77,87,.23); border-radius: 7px; padding: 12px; font-weight: 800; }

    .heatmap {
      display: grid;
      grid-template-columns: 96px repeat(24, 1fr);
      gap: 4px;
      align-items: center;
    }
    .cell {
      height: 44px;
      border-radius: 4px;
      background: #15151a;
      border: 1px solid #17171d;
    }
    .cell[data-level="1"] { opacity: .45; }
    .cell[data-level="2"] { opacity: .65; }
    .cell[data-level="3"] { opacity: .85; }
    .cell[data-level="4"] { opacity: 1; }
    .row-label { font-weight: 900; font-size: 12px; color: #d8d8df; }

    .tabs { display: flex; gap: 8px; margin: -8px 0 24px; }
    .tabs button { height: 38px; padding: 0 18px; border-radius: 8px; border: 1px solid var(--line); color: #aaaab3; font-weight: 800; cursor: pointer; }
    .tabs button.active { background: rgba(255,121,0,.18); color: #fff; border-color: rgba(255,121,0,.5); }
    .office {
      height: 640px;
      border-radius: 8px;
      border: 1px solid var(--line);
      background:
        linear-gradient(rgba(255,255,255,.025) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.025) 1px, transparent 1px),
        radial-gradient(circle at 55% 50%, rgba(255,121,0,.08), transparent 360px),
        #08080a;
      background-size: 64px 64px, 64px 64px, auto, auto;
      position: relative;
      overflow: hidden;
    }
    .desk, .hub, .room {
      position: absolute;
      border: 1px solid #2c2c34;
      background: rgba(18,18,24,.82);
      border-radius: 8px;
      text-align: center;
      padding: 12px;
    }
    .desk { width: 170px; height: 70px; }
    .hub { left: 30%; top: 40%; width: 40%; height: 190px; border-color: rgba(255,121,0,.6); color: var(--orange); }
    .room { right: 5%; top: 14%; width: 25%; height: 470px; border-style: dashed; border-color: rgba(255,121,0,.5); }
    .agent-dot {
      width: 34px;
      height: 34px;
      border-radius: 50%;
      display: grid;
      place-items: center;
      margin: 34px auto 6px;
      background: var(--agent);
      color: #fff;
      font-weight: 900;
    }

    .toolbar { display: flex; gap: 12px; align-items: center; margin-bottom: 18px; }
    .search { flex: 1; height: 42px; padding: 0 14px; border: 1px solid var(--line); border-radius: 7px; background: #111115; }
    .kanban { grid-template-columns: repeat(3, 1fr); }
    .column { min-height: 620px; border-color: #2a2a31; }
    .column-head { display: flex; justify-content: space-between; margin-bottom: 18px; text-transform: uppercase; font-size: 12px; font-weight: 900; color: #aaaab3; }
    .task {
      border: 1px solid #2b2b33;
      border-left: 4px solid var(--blue);
      border-radius: 8px;
      padding: 14px;
      background: #121217;
      margin-bottom: 12px;
    }
    .task.done { opacity: .66; text-decoration: line-through; border-left-color: var(--green); background: rgba(25,209,159,.06); }
    .task.urgent { border-left-color: var(--red); box-shadow: inset 0 0 0 1px rgba(255,77,87,.16); }
    .task strong { display: block; margin-bottom: 12px; }
    .tags { display: flex; gap: 8px; flex-wrap: wrap; }
    .tag { font-family: inherit; color: #fff; }

    .content-layout { grid-template-columns: 320px 1fr; align-items: start; }
    .doc-list { height: 760px; overflow: hidden; padding: 10px; border-right: 3px solid var(--orange); }
    .doc { display: grid; grid-template-columns: 34px 1fr; gap: 12px; padding: 16px; border-radius: 8px; margin-bottom: 12px; background: #151519; }
    .doc.active { outline: 1px solid rgba(255,121,0,.6); }
    .preview { min-height: 760px; border-right: 4px solid var(--orange); }
    .article { max-width: 1060px; padding: 30px; }
    .article h2 { font-size: 26px; margin: 16px 0; }
    .article p, .article li { color: #c9c9d0; line-height: 1.65; }

    .chat-layout { grid-template-columns: 260px 1fr; min-height: 820px; }
    .chat-list { border-right: 1px solid var(--line); padding-right: 22px; }
    .chat-agent { gap: 12px; padding: 14px; border-radius: 8px; margin-bottom: 10px; }
    .chat-agent.active { background: rgba(255,121,0,.09); border-left: 3px solid var(--orange); }
    .thread { display: flex; flex-direction: column; min-height: 820px; }
    .messages { flex: 1; border-top: 1px solid #17171b; border-bottom: 1px solid #17171b; padding: 26px 0; }
    .message { max-width: 560px; padding: 15px 18px; background: #17171c; border: 1px solid #282830; border-radius: 8px; margin: 0 0 20px 34px; line-height: 1.45; color: #e8e8ef; }
    .composer { display: flex; gap: 12px; padding-top: 18px; }

    .resource { padding: 28px; }
    .resource .metric-value { font-size: 44px; }
    .model-row {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 16px;
      align-items: center;
      padding: 18px;
      border-radius: 8px;
      background: #131318;
      margin-bottom: 12px;
    }

    .planner-tools {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 14px;
      margin: 28px 0 10px;
    }
    .week-switcher {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #101014;
      padding: 6px;
      font-weight: 900;
    }
    .week-switcher .icon-btn { height: 30px; width: 30px; }
    .week-range { min-width: 190px; text-align: center; }
    .week-table-wrap { overflow-x: auto; padding: 0; }
    .week-table {
      width: 100%;
      min-width: 1040px;
      border-collapse: collapse;
      table-layout: fixed;
    }
    .week-table th,
    .week-table td {
      border-bottom: 1px solid #202027;
      border-right: 1px solid #202027;
      padding: 12px 10px;
      text-align: center;
      color: #e7e7ee;
      font-size: 13px;
    }
    .week-table th {
      color: #f4f4f7;
      background: rgba(255,255,255,.025);
      font-size: 12px;
      vertical-align: bottom;
    }
    .week-table th:first-child,
    .week-table td:first-child,
    .week-table th:nth-child(2),
    .week-table td:nth-child(2) {
      width: 86px;
      font-weight: 900;
    }
    .week-table th:last-child,
    .week-table td:last-child { border-right: 0; }
    .task-icon {
      display: block;
      color: var(--orange);
      font-size: 18px;
      margin-bottom: 6px;
    }
    .task-check {
      accent-color: var(--purple);
      width: 14px;
      height: 14px;
    }
    .daily-progress {
      display: grid;
      grid-template-columns: 42px 1fr;
      gap: 8px;
      align-items: center;
    }
    .note-link {
      color: var(--purple);
      font-weight: 900;
      white-space: nowrap;
      cursor: pointer;
    }
    .check-row, .note-item {
      display: grid;
      grid-template-columns: 18px 1fr 28px;
      gap: 8px;
      align-items: center;
      margin: 10px 0;
      color: #d8d8df;
    }
    .check-row input, .note-item input[type="checkbox"] { accent-color: var(--orange); }
    .check-row span.done, .note-item span.done { color: var(--muted); text-decoration: line-through; }
    .delete-btn {
      width: 28px;
      height: 28px;
      border: 1px solid #33333b;
      border-radius: 7px;
      color: var(--red);
      cursor: pointer;
    }
    .inline-form { display: flex; gap: 8px; margin-top: 14px; }
    .inline-form .search { min-width: 0; }
    .note-actions { display: flex; flex-wrap: wrap; gap: 10px; margin-top: 16px; }
    .note-editor { display: grid; gap: 12px; }
    .note-item span { min-width: 0; overflow-wrap: anywhere; }

    .data-note {
      margin-top: 30px;
      color: #bdbdc6;
      border: 1px dashed #3a3a43;
      background: rgba(255,255,255,.025);
    }

    @media (max-width: 1100px) {
      .app { width: min(100vw - 24px, 980px); }
      .topbar { height: auto; min-height: 58px; flex-wrap: wrap; gap: 12px; padding: 12px; }
      .nav { order: 3; width: 100%; overflow-x: auto; padding-bottom: 2px; }
      main { padding-top: 42px; }
      .cols-4, .cols-3, .cols-2, .agent-grid, .kanban, .content-layout, .chat-layout { grid-template-columns: 1fr; }
      .agent-grid { grid-template-columns: repeat(2, 1fr); }
      .planner-tools { align-items: flex-start; flex-direction: column; }
      .page-header { flex-direction: column; }
      .heatmap { grid-template-columns: 72px repeat(12, 1fr); }
      .heatmap .cell:nth-child(n+14) { display: none; }
    }

    @media (max-width: 620px) {
      .agent-grid { grid-template-columns: 1fr; }
      h1 { font-size: 28px; }
      .status { display: none; }
      .office { height: 520px; }
      .desk, .hub, .room { transform: scale(.74); transform-origin: top left; }
    }
  </style>
</head>
<body>
  <div class="app">
    <header class="topbar">
      <div class="brand"><div class="logo">KM</div><strong>Komputer<span>Mechanic OS</span></strong></div>
      <nav class="nav" id="nav"></nav>
      <div class="status">
        <button class="icon-btn" title="Messages">[]</button>
        <button class="icon-btn" title="Refresh">R</button>
        <button class="icon-btn" title="Alerts">!</button>
        <span class="pill">v0.1.8</span>
        <span class="dot"></span>
        <span>System Online</span>
      </div>
    </header>

    <main>
      <section id="dashboard" class="page active"></section>
      <section id="content" class="page"></section>
      <section id="agents" class="page"></section>
      <section id="tasks" class="page"></section>
      <section id="chat" class="page"></section>
      <section id="productivity" class="page"></section>
      <section id="monitor" class="page"></section>
    </main>
  </div>

  <script>
    /*
      Static template: top navigation, dark KM OS visual system, responsive grids,
      cards, charts, Kanban columns, office map, document preview, and chat shell.

      Mock placeholders to replace with live data later:
      - MOCK_DATA.agents: real OpenClaw agent registry, model assignment, status, last activity.
      - MOCK_DATA.metrics: dashboard counters, uptime, task totals.
      - MOCK_DATA.tasks: live task/Kanban API or task database.
      - MOCK_DATA.activity: recent agent event stream and historical chart points.
      - MOCK_DATA.documents: generated files/content index and rendered previews.
      - MOCK_DATA.messages: per-agent chat/session history.
      - MOCK_DATA.monitor: gateway, Discord, database, VPS, token/cost, cron status.
      - MOCK_DATA.productivity: planner goals, default tasks, daily checklist, notes.
    */
    let MOCK_DATA = {
      pages: ["Dashboard", "Content", "Agents", "Tasks", "Chat", "Productivity", "Monitor"],
      metrics: [
        ["Active Agents", "7", "online now", "orange"],
        ["Agent Tasks", "2", "logged tasks", "blue"],
        ["To-Dos Open", "8", "in progress + todo", "green"],
        ["Uptime", "7d 0h", "since boot", "purple"]
      ],
      agents: [
        { name: "dsa-agent", role: "Configured OpenClaw agent", icon: "DA", color: "var(--blue)", tasks: 0, success: 0, model: "openai/gpt-5.5", active: "No logs yet", status: "NO LOGS" },
        { name: "Orchestrator", role: "Verify local logging system auto model", icon: "Or", color: "var(--purple)", tasks: 1, success: 100, model: "openai/gpt-5.4", active: "4 days ago", status: "COMPLETED" },
        { name: "blog-swarm", role: "Configured OpenClaw agent", icon: "BS", color: "var(--pink)", tasks: 0, success: 0, model: "openai/gpt-5.4", active: "No logs yet", status: "NO LOGS" },
        { name: "Scout", role: "deep research specialist", icon: "Sc", color: "var(--yellow)", tasks: 0, success: 0, model: "openai/gpt-5.4", active: "No logs yet", status: "NO LOGS" },
        { name: "Scribe", role: "professional content writer", icon: "Sc", color: "var(--green)", tasks: 0, success: 0, model: "openai/gpt-5.4", active: "No logs yet", status: "NO LOGS" },
        { name: "Reach", role: "digital marketing strategist", icon: "Re", color: "var(--red)", tasks: 0, success: 0, model: "openai/gpt-5.4", active: "No logs yet", status: "NO LOGS" },
        { name: "Dev", role: "Verify local logging system explicit model", icon: "De", color: "var(--cyan)", tasks: 1, success: 100, model: "test-model", active: "4 days ago", status: "COMPLETED" }
      ],
      agentStats: {
        today: 0,
        week: 2,
        total: 2,
        completed: 2,
        successRate: 100,
        weekRate: 100,
        distribution: [
          { label: "Completed", value: 2, color: "var(--green)" },
          { label: "In Progress", value: 0, color: "var(--blue)" },
          { label: "Failed", value: 0, color: "var(--red)" },
          { label: "Pending", value: 0, color: "var(--yellow)" }
        ],
        models: [
          { model: "openai/gpt-5.4", tasks: 1, share: 50 },
          { model: "test-model", tasks: 1, share: 50 }
        ]
      },
      activity: {
        days: ["Mon", "Tue", "Wed", "Thu", "Fri", "Sat", "Sun"],
        total: [50, 56, 44, 64, 70, 36, 61],
        completed: [48, 54, 42, 61, 68, 35, 58],
        events: [
          ["Orchestrator", "Verify local logging system auto model", "Completed", "4 days ago"],
          ["Dev", "Verify local logging system explicit model", "Completed", "4 days ago"]
        ]
      },
      tasks: {
        todo: [
          ["Audit OpenClaw gateway logs for reconnect patterns", "Work", "Urgent", "7d overdue"],
          ["Write YouTube title A/B variants for next 3 uploads", "Marketing", "Normal", "5d overdue"],
          ["Draft outreach email to 5 top AI newsletter sponsors", "Marketing", "Normal", "4d overdue"],
          ["Plan community Discord event for next weekend", "Work", "Someday", ""]
        ],
        progress: [
          ["Record walkthrough video of the Mission Control dashboard", "Marketing", "Urgent", "6d overdue"],
          ["Review and merge Dev's mobile responsiveness PR", "Development", "Urgent", "7d overdue"],
          ["Set up Tailscale exit-node fallback for VPS failover", "Development", "Normal", "5d overdue"]
        ],
        done: [
          ["Full mobile responsiveness audit and fix pass", "Development", "Urgent", ""],
          ["Configure nginx reverse proxy on Tailscale IP", "Development", "Normal", ""],
          ["Implement Model Assignment card in Agents tab", "Development", "Urgent", ""],
          ["Fix agent walk-back animation after log entry", "Development", "Urgent", ""],
          ["Publish weekly community update", "Marketing", "Urgent", ""],

    function getWeekNumber(date) {
      const copy = new Date(Date.UTC(date.getFullYear(), date.getMonth(), date.getDate()));
      copy.setUTCDate(copy.getUTCDate() + 4 - (copy.getUTCDay() || 7));
      const yearStart = new Date(Date.UTC(copy.getUTCFullYear(), 0, 1));
      return Math.ceil((((copy - yearStart) / 86400000) + 1) / 7);
    }

        cache: "no-store",

        ...options
      });
      if (!response.ok) throw new Error((await response.json()).error?.message || "Productivity request failed");
      return response.json();
    }

        selectedWeekDate = selectedWeekDate || PRODUCTIVITY_DATA.today;
        selectedProductivityDate = selectedProductivityDate || PRODUCTIVITY_DATA.today;
        if (selectedProductivityDate !== PRODUCTIVITY_DATA.today) {

          ${productivityCard("defaults", "Default Daily Tasks", `${productivityData.todayCompleted || 0} / ${defaultTasks.length} today`, "accent-orange", "var(--orange)")}
        </div>
        ${section("C", `Daily Default Task Progress - ${escapeHtml(productivityData.monthName || "This Month")}`)}<div class="card chart-card">${lineChart(monthSeries, monthSeries)}</div>
        <div class="planner-tools">
          ${section("W", "Default Entire Week", "Track every default daily task across the selected week.")}
          <div class="week-switcher"><button class="icon-btn" title="Previous week" data-week-shift="-7">&lt;</button><span class="week-range">Week ${productivityData.weekNumber || ""} - ${escapeHtml(productivityData.weekRange || "Current Week")}</span><button class="icon-btn" title="Next week" data-week-shift="7">&gt;</button></div>
          <button class="ghost-btn" id="today-note-btn" style="color:var(--orange)">Today</button>
        </div>
        <div class="card week-table-wrap"><table class="week-table">
          <thead><tr><th>Date</th><th>Day</th>${defaultTasks.map((task, i) => `<th><span class="task-icon">${taskIcons[i] || "T"}</span>${escapeHtml(task.body)}</th>`).join("")}<th>Daily Progress</th><th>Notes</th></tr></thead>
          <tbody>${weekRows}</tbody>
        </table></div>
        ${section("N", "Notes")}<div class="grid cols-2">${noteEditor(productivityData.selectedNote || {}, `${selectedDay.date || ""} (${selectedDay.day || ""})`)}<div class="card"><h3>Quick Actions</h3><div class="note-actions"><button class="ghost-btn" id="clear-completed-notes">Clear Completed</button><button class="ghost-btn" id="export-notes">Export Notes</button><button class="ghost-btn" id="print-notes">Print Notes</button><button class="ghost-btn" id="delete-notes" style="color:var(--red)">Delete Notes</button></div></div></div>`;
      bindProductivityEvents();
    }

    function currentNotePayload() {
      const title = document.getElementById("note-title")?.value || "";
      const note = PRODUCTIVITY_DATA?.selectedNote || { items: [] };
      return { title, items: note.items || [] };
    }

    async function saveCurrentNote(payload) {
      if (location.protocol === "file:") return;
      PRODUCTIVITY_DATA.selectedNote = await productivityRequest(`/api/productivity/notes/${selectedProductivityDate}`, {
        method: "PATCH",
        body: JSON.stringify(payload)
      });
      await refreshProductivity();
    }

    function bindProductivityEvents() {
      document.querySelectorAll("[data-productivity-add]").forEach(form => form.addEventListener("submit", async event => {
        event.preventDefault();
        const body = new FormData(form).get("body")?.trim();
        if (!body || location.protocol === "file:") return;
        await productivityRequest("/api/productivity/items", { method: "POST", body: JSON.stringify({ scope: form.dataset.productivityAdd === "defaults" ? "default" : form.dataset.productivityAdd, body }) });
        await refreshProductivity();
      }));
      document.querySelectorAll("[data-productivity-toggle]").forEach(input => input.addEventListener("change", async event => {
        if (location.protocol === "file:") return;
        await productivityRequest(`/api/productivity/items/${event.target.dataset.productivityToggle}/toggle`, { method: "PATCH", body: JSON.stringify({}) });
        await refreshProductivity();
      }));
      document.querySelectorAll("[data-productivity-delete]").forEach(button => button.addEventListener("click", async event => {
        event.preventDefault();
        if (location.protocol === "file:") return;
        await productivityRequest(`/api/productivity/items/${event.target.dataset.productivityDelete}`, { method: "DELETE" });
        await refreshProductivity();
      }));
      document.querySelectorAll("[data-progress-task]").forEach(input => input.addEventListener("change", async event => {
        if (location.protocol === "file:") return;
        await productivityRequest("/api/productivity/progress", { method: "POST", body: JSON.stringify({ date: event.target.dataset.progressDate, item_id: Number(event.target.dataset.progressTask), completed: event.target.checked }) });
        await refreshProductivity();
      }));
      document.querySelectorAll("[data-note-date]").forEach(link => link.addEventListener("click", async event => {
        selectedProductivityDate = event.target.dataset.noteDate;
        if (location.protocol !== "file:") PRODUCTIVITY_DATA.selectedNote = await productivityRequest(`/api/productivity/notes/${selectedProductivityDate}`);
        productivity();
      }));
      document.querySelectorAll("[data-week-shift]").forEach(button => button.addEventListener("click", async event => {
        selectedWeekDate = shiftDate(selectedWeekDate || PRODUCTIVITY_DATA.today, Number(event.currentTarget.dataset.weekShift));
        selectedProductivityDate = selectedWeekDate;
        await refreshProductivity();
      }));
      document.getElementById("today-note-btn")?.addEventListener("click", async () => {
        selectedWeekDate = TODAY_KEY;
        selectedProductivityDate = TODAY_KEY;
        if (location.protocol !== "file:") PRODUCTIVITY_DATA.selectedNote = await productivityRequest(`/api/productivity/notes/${selectedProductivityDate}`);
        await refreshProductivity();
      });
      document.getElementById("note-title")?.addEventListener("change", async () => saveCurrentNote(currentNotePayload()));
      document.getElementById("note-add-form")?.addEventListener("submit", async event => {
        event.preventDefault();
        const body = new FormData(event.target).get("body")?.trim();
        if (!body) return;
        const payload = currentNotePayload();
        payload.items.push({ body, completed: false });
        await saveCurrentNote(payload);
      });
      document.querySelectorAll("[data-note-toggle]").forEach(input => input.addEventListener("change", async event => {
        const payload = currentNotePayload();
        payload.items[Number(event.target.dataset.noteToggle)].completed = event.target.checked;
        await saveCurrentNote(payload);
      }));
      document.querySelectorAll("[data-note-delete]").forEach(button => button.addEventListener("click", async event => {
        event.preventDefault();
        const payload = currentNotePayload();
        payload.items.splice(Number(event.target.dataset.noteDelete), 1);
        await saveCurrentNote(payload);
      }));
      document.getElementById("clear-completed-notes")?.addEventListener("click", async () => {
        if (location.protocol === "file:") return;
        PRODUCTIVITY_DATA.selectedNote = await productivityRequest(`/api/productivity/notes/${selectedProductivityDate}`, { method: "PATCH", body: JSON.stringify({ action: "clear_completed" }) });
        await refreshProductivity();
      });
      document.getElementById("delete-notes")?.addEventListener("click", async () => {
        if (location.protocol === "file:") return;
        await productivityRequest(`/api/productivity/notes/${selectedProductivityDate}`, { method: "DELETE" });
        await refreshProductivity();
      });
      document.getElementById("export-notes")?.addEventListener("click", () => {
        const note = currentNotePayload();
        const text = [note.title, ...note.items.map(item => `${item.completed ? "[x]" : "[ ]"} ${item.body}`)].filter(Boolean).join("\n");
        navigator.clipboard?.writeText(text);
      });
      document.getElementById("print-notes")?.addEventListener("click", () => window.print());
    }

    function monitor() {
      document.getElementById("monitor").innerHTML = title("M", "Monitor", "System health, token usage, and model config.") +
        `<div class="grid cols-4">${MOCK_DATA.monitor.status.map(metricCard).join("")}</div>${section("V", "VPS Resources", "Live CPU - RAM - Storage")}<div class="grid cols-3">${MOCK_DATA.monitor.resources.map(r => `<div class="card resource"><span class="metric-label">${r[0]}</span><span class="metric-value">${r[1]}</span><p>${r[2]}</p><div class="progress"><div class="bar" style="--w:${r[4]}%;background:var(--${r[3]})"></div></div></div>`).join("")}</div>
        ${section("$", "Token Usage & Cost", "API consumption tracking")}<div class="grid cols-3">${metricCard(["Total Requests", "1247", "", "orange"])}${metricCard(["Estimated Tokens", "4.2M", "", "purple"])}${metricCard(["Est. Cost", "$21.09", "", "green"])}</div><div class="grid cols-2"><div class="card">${MOCK_DATA.monitor.usage.map(u => `<div class="model-row"><div><strong>${u[0]}</strong><p>${u[2]}</p></div><div><strong>${u[1]}</strong><p style="color:var(--green)">${u[3]}</p></div></div>`).join("")}</div><div class="card chart-card"><h3>Usage Trend</h3>${lineChart([150,178,138,205,220,112,240], [140,170,128,190,210,105,230])}</div></div>`;
    }

    async function loadDashboardData() {
      if (location.protocol === "file:") return;
      try {
        const response = await fetch("/api/bootstrap", { cache: "no-store" });
        if (!response.ok) return;
        MOCK_DATA = await response.json();
      } catch (error) {
        console.warn("Using embedded dashboard preview data", error);
      }
    }

    async function initializeDashboard() {
      await loadDashboardData();
      await loadProductivityData();
      dashboard();
      agents();
      tasks();
      content();
      chat();
      productivity();
      monitor();
    }

    initializeDashboard();
  </script>
</body>
</html>
